name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrderLinkApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> $GITHUB_ENV

      - name: Install Gradle and create wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O gradle.zip
          unzip -q gradle.zip
          $PWD/gradle-8.0/bin/gradle wrapper --gradle-version 8.0 --no-daemon

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: OrderLinkApp/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release and upload APK (تحميل مباشر من الجوال)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: رابط النظام - Build ${{ github.run_number }}
          files: OrderLinkApp/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
